<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Student</h2>
    <ul id="list"></ul>

    <script>
        let students = [
            { "Name": "Jay" },
            { "Name": "Kunal" },
            { "Name": "Human" },
        ]
        let output = "";
        students.forEach(p => {
            output += "<li>" + p.Name + "</li>";
        });
        document.getElementById("list").innerHTML = output;
    </script>
</body>

</html>
