<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="show()">Show Data</button>
    <p id="data"></p>

    <script>
        function show() {
            let user = {
                "Name" : "Humans",
                "City" : "Surat"
            };
            document.getElementById("data").innerHTML = user.Name + " lives in " + user.City + " City ";
        }
    </script>
</body>
</html>
