<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>External Json</h2>
    <p id="d"></p>

    <script>
        fetch("a.json")
        .then(res => res.json())
        .then(data => {
            document.getElementById("d").innerHTML = data.Name;
        });
    </script>
</body>
</html>
